<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZS Admin — Streetwear Intelligence</title>
  <style>
    /* Palette ZS : Noir Profond #1a1a1a, Or #D4AF37, Bordeaux #800020 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    
    .topbar { 
        background: #1a1a1a; 
        padding: 0 24px; 
        height: 65px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        border-bottom: 2px solid #D4AF37; 
    }
    
    .topbar-left { display: flex; align-items: center; gap: 15px; }
    .logo { 
        width: 42px; height: 42px; 
        background: #D4AF37; 
        border-radius: 8px; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 22px; color: #1a1a1a;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    
    .topbar h1 { color: #D4AF37; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .topbar p { color: #888; font-size: 12px; }
    
    .pill { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 4px 14px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #D4AF37; box-shadow: 0 0 8px #D4AF37; } 
    .dot-red { background: #800020; } /* Bordeaux */
    
    .content { padding: 30px; max-width: 1200px; margin: 0 auto; }
    
    .login-box { 
        max-width: 380px; margin: 100px auto; 
        background: #1a1a1a; border-radius: 20px; 
        border: 1px solid #333; padding: 2.5rem; text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .login-box h2 { font-size: 20px; color: #D4AF37; margin-bottom: 10px; }
    .login-box input { 
        width: 100%; padding: 12px; background: #2d2d2d; 
        border: 1px solid #444; border-radius: 10px; color: white; 
        outline: none; margin-bottom: 15px; text-align: center;
    }
    .login-box input:focus { border-color: #D4AF37; }
    
    .btn-primary { 
        width: 100%; padding: 12px; background: #D4AF37; color: #1a1a1a; 
        border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .btn-primary:hover { background: #b8962d; transform: translateY(-2px); }

    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .metric { background: #1a1a1a; border-radius: 15px; border: 1px solid #333; padding: 20px; transition: 0.3s; }
    .metric:hover { border-color: #D4AF37; transform: translateY(-5px); }
    .metric-label { font-size: 13px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .metric-val { font-size: 32px; font-weight: 700; color: #fff; }
    .metric-val.gold { color: #D4AF37; }
    
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
    .card { background: #1a1a1a; border-radius: 15px; border: 1px solid #333; padding: 20px; }
    .card-title { font-size: 15px; font-weight: 600; color: #D4AF37; }
    
    .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .badge-ok { background: rgba(212,175,55,0.1); color: #D4AF37; border: 1px solid #D4AF37; }
    .badge-danger { background: rgba(128,0,32,0.1); color: #800020; border: 1px solid #800020; } /* Bordeaux */

    .log-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #2d2d2d; }
    .log-msg { font-size: 13px; color: #ccc; flex: 1; }
    .log-time { color: #666; font-size: 11px; }

    .refresh-btn { 
        background: #2d2d2d; border: 1px solid #444; border-radius: 8px; 
        padding: 8px 16px; color: #D4AF37; cursor: pointer; font-size: 12px;
    }
    .refresh-btn:hover { background: #3d3d3d; border-color: #D4AF37; }

    #dashboard { display: none; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🐍</div>
    <div>
      <h1>ZS ASSISTANT — ADMIN</h1>
      <p>Brand Protection & Analytics</p>
    </div>
  </div>
  <div id="statusBar">
    <div class="pill"><div class="dot dot-green"></div><span>ZS Engine Active</span></div>
  </div>
</div>

<div id="loginBox" class="content">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:15px">👑</div>
    <h2>Accès Privé ZS</h2>
    <p>Authentification requise pour le dashboard</p>
    <input type="password" id="keyInput" placeholder="Clé Secrète..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" onclick="login()">ENTRER</button>
    <div style="color:#800020; font-size:13px; margin-top:10px" id="loginError"></div>
  </div>
</div>

<div id="dashboard" class="content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px">
    <div style="font-size:14px;color:#666" id="lastUpdate">Sync : —</div>
    <button class="refresh-btn" onclick="loadData()">↻ ACTUALISER LES DATA</button>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Volume de Chat</div>
      <div class="metric-val gold" id="mTotal">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Injections Bloquées</div>
      <div class="metric-val" style="color:#800020" id="mDanger">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avertissements</div>
      <div class="metric-val" style="color:#ffa502" id="mWarn">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Disponibilité</div>
      <div class="metric-val gold">100%</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title" style="margin-bottom:20px">Analytics Répartition</div>
      <div style="display:flex; justify-content:center; align-items:center; gap:20px">
        <canvas id="pieChart" width="130" height="130"></canvas>
        <div id="pieLegend" style="font-size:12px; color:#888; display:flex; flex-direction:column; gap:8px"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🧠 Mémoire Active (PDFs)</div>
      <div id="filesContainer" style="margin-top:15px;">
      </div>
      <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
      <input type="file" id="fileInput" multiple style="display:none" onchange="handleUpload(this.files)">
      <button class="btn-primary" style="padding: 8px;" onclick="document.getElementById('fileInput').click()">+ Ajouter un PDF</button>
    </div>
  </div>

  <div class="card" style="margin-bottom: 25px;">
    <div class="card-title" style="margin-bottom:15px">💬 Live Chat Stream</div>
    <div id="logsContainer" style="max-height: 400px; overflow-y: auto;"></div>
  </div>
</div>

<script>
let adminKey = '';

function login() {
  adminKey = document.getElementById('keyInput').value;
  loadData();
}

async function loadData() {
  try {
    const res = await fetch(`/admin/dashboard?key=${adminKey}`);
    if (res.status === 403) {
      document.getElementById('loginError').textContent = 'Accès Refusé. Clé ZS invalide.';
      return;
    }
    const data = await res.json();
    
    // Charger les fichiers
    const resFiles = await fetch(`/admin/files?key=${adminKey}`);
    const dataFiles = await resFiles.ok ? await resFiles.json() : {files: []};

    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(data, dataFiles.files);
  } catch(e) {
    document.getElementById('loginError').textContent = 'Erreur serveur.';
  }
}

function renderDashboard(data, files) {
  const { stats, logs } = data; // Assure-toi que ton backend envoie bien "logs"
  const total = stats.total || 0;
  const danger = stats.danger || 0;
  const warn = stats.warning || 0;

  document.getElementById('mTotal').textContent = total;
  document.getElementById('mDanger').textContent = danger;
  document.getElementById('mWarn').textContent = warn;
  document.getElementById('lastUpdate').textContent = 'Dernier scan : ' + new Date().toLocaleTimeString();

  // Pie Chart avec les couleurs ZS
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,130,130);
  const slices = [
    {val: total - danger - warn, color: '#D4AF37', label: 'Valid'}, // Gold
    {val: warn, color: '#a9a9a9', label: 'Warning'}, // Gris
    {val: danger, color: '#800020', label: 'Danger'} // Bordeaux
  ].filter(s => s.val > 0);
  
  let start = -Math.PI/2;
  const tot = slices.reduce((a,b) => a+b.val, 0) || 1;
  slices.forEach(s => {
    const angle = (s.val/tot) * 2 * Math.PI;
    ctx.beginPath(); ctx.moveTo(65,65);
    ctx.arc(65,65,60,start,start+angle);
    ctx.fillStyle = s.color; ctx.fill();
    start += angle;
  });
  ctx.beginPath(); ctx.arc(65,65,40,0,2*Math.PI);
  ctx.fillStyle = '#1a1a1a'; ctx.fill();

  document.getElementById('pieLegend').innerHTML = slices.map(s => 
    `<div><span style="color:${s.color}">●</span> ${s.label}: ${s.val}</div>`
  ).join('');

  // Affichage des Fichiers
  const filesDiv = document.getElementById('filesContainer');
  filesDiv.innerHTML = (files && files.length > 0) ? files.map(f => `
    <div style="display:flex; align-items:center; gap:10px; background:#2d2d2d; padding:8px; border-radius:8px; margin-bottom:5px; font-size:12px;">
      <span>📄</span>
      <span style="flex:1; color:#D4AF37;">${f}</span>
      <span style="color:#666;">Active</span>
    </div>
  `).join('') : '<p style="color:#666; font-size:12px;">Aucun document en mémoire.</p>';

  // Logs
  const logsList = logs || [];
  const logsDiv = document.getElementById('logsContainer');
  logsDiv.innerHTML = logsList.slice().reverse().map(l => `
    <div class="log-row">
      <div class="log-time">${l.time.split(' ')[1] || ''}</div>
      <div style="flex:1">
        <div style="font-weight:bold; color:#D4AF37; font-size:11px;">USER :</div>
        <div class="log-msg">${l.question}</div>
      </div>
      <span class="badge ${l.status=='OK'?'badge-ok':'badge-danger'}">${l.status}</span>
    </div>
  `).join('') || '<p style="color:#666; font-size:12px;">En attente de données...</p>';
}
</script>
</body>
</html>
